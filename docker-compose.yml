services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: jailtracker
      POSTGRES_PASSWORD: jailtracker
      POSTGRES_DB: jailtracker
    volumes:
      - db_data:/var/lib/postgresql/data
    # Порт наружу НЕ пробрасываем (security). Раскомментируйте для локальной отладки:
    # ports: ["5435:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jailtracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # AOF включён, чтобы очередь команд устройствам переживала рестарт (known issue SafeMektep #2/#9)
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://jailtracker:jailtracker@db:5432/jailtracker
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jailtracker.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8000"

  gateway:
    build: ./backend
    command: python -m gateway.main
    environment:
      DATABASE_URL: postgresql+psycopg://jailtracker:jailtracker@db:5432/jailtracker
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "13000:13000"
      - "13001:13001"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
  redis_data:
